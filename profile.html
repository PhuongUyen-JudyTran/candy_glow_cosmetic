<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Candy Glow Cosmetic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style_register.css">
    <link rel="stylesheet" href="style_profile.css">
</head>

<body class="register-body">

    <header class="register-header py-3 mb-5">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="index.html" class="back-btn text-white text-decoration-none">
                <i class="fa-solid fa-angles-left"></i> Back
            </a>
        </div>
    </header>

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-0 shadow-lg p-4" style="border-radius: 25px;">
                    <div class="text-center mb-1">
                        <div class="profile-avatar-circle mb-3">
                            <i class="fas fa-user-circle fa-5x text-pink"></i>
                        </div>
                        <h2 id="display-fullname" class="fw-bold text-dark-pink">Full Name</h2>
                        <span class="badge bg-light-pink text-dark-pink p-2">Membership</span>
                    </div>

                    <hr class="opacity-25">

                    <div class="profile-info-list">
                        <div class="d-flex align-items-center mb-3">
                            <i class="fas fa-user text-muted me-3"></i>
                            <div>
                                <small class="text-muted d-block">Username</small>
                                <strong id="display-username"></strong>
                            </div>
                        </div>

                        <div class="d-flex align-items-center mb-3">
                            <i class="fas fa-envelope text-muted me-3"></i>
                            <div>
                                <small class="text-muted d-block">Email Address</small>
                                <strong id="display-email"></strong>
                            </div>
                        </div>

                        <div class="d-flex align-items-center mb-4">
                            <i class="fas fa-phone text-muted me-3"></i>
                            <div>
                                <small class="text-muted d-block">Phone Number</small>
                                <strong id="display-phone"></strong>
                            </div>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button class="btn btn-signup py-2" id="edit-profile">Edit Profile</button>
                        <button class="btn btn-outline-danger py-2" id="btn-logout-profile">Logout Account</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="auth.js"></script>
    <script src="profile.js"></script>
</body>

</html>
